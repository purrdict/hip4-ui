name: Deploy Registry Site

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "site/**"
      - "registry/**"
  workflow_dispatch:

concurrency:
  group: deploy-registry
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to CloudFront
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: site

      - name: Generate registry JSONs
        run: bun run generate-registry
        working-directory: site

      - name: Build Astro site
        run: bunx astro build
        working-directory: site

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync to S3
        run: |
          aws s3 sync site/dist/ s3://${{ secrets.S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=60, s-maxage=300"

          aws s3 cp s3://${{ secrets.S3_BUCKET }}/ s3://${{ secrets.S3_BUCKET }}/ \
            --recursive \
            --exclude "*" \
            --include "r/*.json" \
            --content-type "application/json" \
            --metadata-directive REPLACE \
            --cache-control "public, max-age=60, s-maxage=300"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_ID }} \
            --paths "/*"
